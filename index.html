}

}

}

  margin-top: 10px;
}

  margin-top: 2px;
}
.badges {

  flex-wrap: wrap;
  margin-top: 9px;
}
.badge {

  font-size: 12px;
  font-weight: 800;

.badge.neutral { color: var(--muted); background: var(--soft); }
.detail-grid {

.detail-stat {

}

.notice {

  border-color: #b8e6d5;
}
.table-wrap {

  border: 1px solid var(--line);
  border-radius: 8px;
}
table {

}

}

.course-timetable {

}

  padding: 11px 13px;
  border-top: 1px solid #edf0f5;
  align-items: start;

.muted { color: var(--muted); }

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const STORAGE_KEY = `instructor-system-edits:${DATA.stats.sourceFile}`;
const ORIGINAL_ASSIGNMENTS = JSON.parse(JSON.stringify(DATA.assignments));
const ORIGINAL_INSTRUCTOR_BY_ID = Object.fromEntries(ORIGINAL_ASSIGNMENTS.map((item) => [item.id, item.instructor]));
const state = { section: 'overview', instructor: '', selectedInstructor: '', course: '', month: '', search: '', editMode: false };

const fmtDate = (date) => {
  if (!date) return '';
  const d = new Date(date + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}(${days[d.getDay()]})`;
};
const unique = (arr) => [...new Set(arr.filter(Boolean))];
const byDate = (a, b) => (a.date || '').localeCompare(b.date || '') || a.startMin - b.startMin || a.instructor.localeCompare(b.instructor, 'ko');
const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

function init() {
  loadSavedEdits();
  recalculate();
  document.getElementById('sourceInfo').textContent = `${DATA.stats.sourceFile} 기준 · 생성 ${DATA.stats.updatedAt}`;
  bindNav();
  buildFilters();
  bindFilters();
  renderAll();
  const first = DATA.summary[0]?.instructor || '';
  selectInstructor(first);
}

function allInstructorNames() {
  return unique([...DATA.summary.map((x) => x.instructor), ...ORIGINAL_ASSIGNMENTS.map((x) => x.instructor), ...DATA.assignments.map((x) => x.instructor)])
    .sort((a,b) => a.localeCompare(b, 'ko'));
}

function loadSavedEdits() {
  try {
    if (!globalThis.localStorage) return;
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (!saved.assignments) return;
    const savedById = Object.fromEntries(saved.assignments.map((item) => [item.id, item]));
    DATA.assignments = DATA.assignments.map((item) => savedById[item.id] ? { ...item, instructor: savedById[item.id].instructor } : item);
  } catch (error) {
    console.warn('저장된 수정값을 불러오지 못했습니다.', error);
  }
}

function persistEdits() {
  try {
    if (globalThis.localStorage) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ assignments: DATA.assignments, savedAt: new Date().toISOString() }));
    }
  } catch (error) {
    console.warn('브라우저 임시 저장소를 사용할 수 없습니다. 수정본 HTML 저장을 사용하세요.', error);
  }
}

function changedAssignments() {
  return DATA.assignments.filter((item) => ORIGINAL_INSTRUCTOR_BY_ID[item.id] && ORIGINAL_INSTRUCTOR_BY_ID[item.id] !== item.instructor);
}

function recalculate() {
  DATA.assignments.sort(byDate);
  const grouped = {};
  DATA.assignments.forEach((item) => {
    grouped[item.instructor] ||= [];
    grouped[item.instructor].push(item);
  });
  DATA.summary = Object.keys(grouped).sort((a,b) => a.localeCompare(b, 'ko')).map((instructor) => {
    const items = grouped[instructor].sort(byDate);
    const dates = unique(items.map((x) => x.date)).sort();
    const hoursNum = items.reduce((sum, item) => sum + Number(item.hoursNum || 0), 0);
    return {
      instructor,
      sessions: items.length,
      days: dates.length,
      hours: `${Number.isInteger(hoursNum) ? hoursNum : hoursNum.toFixed(1)}H`,
      hoursNum,
      firstDate: dates[0] || '',
      lastDate: dates[dates.length - 1] || '',
      timeConflict: '없음',
      travelConflict: '없음',
      note: ''
    };
  });
  DATA.conflicts = detectConflicts(DATA.assignments);
  const warningByInstructor = {};
  DATA.conflicts.forEach((item) => {
    warningByInstructor[item.instructor] ||= { time: false, travel: false };
    if (item.status.includes('겹침')) warningByInstructor[item.instructor].time = true;
    else warningByInstructor[item.instructor].travel = true;
  });
  DATA.summary.forEach((item) => {
    item.timeConflict = warningByInstructor[item.instructor]?.time ? '있음' : '없음';
    item.travelConflict = warningByInstructor[item.instructor]?.travel ? '있음' : '없음';
  });
  DATA.stats.instructorCount = DATA.summary.length;
  DATA.stats.sessionCount = DATA.assignments.length;
  DATA.stats.totalHours = DATA.assignments.reduce((sum, item) => sum + Number(item.hoursNum || 0), 0);
  DATA.stats.conflictCount = DATA.conflicts.length;
  DATA.stats.flaggedInstructors = unique(DATA.conflicts.map((item) => item.instructor)).sort((a,b) => a.localeCompare(b, 'ko'));
  updateEditStatus();
}

function detectConflicts(assignments) {
  const conflicts = [];
  const groups = {};
  assignments.forEach((item) => {
    groups[`${item.instructor}|${item.date}`] ||= [];
    groups[`${item.instructor}|${item.date}`].push(item);
  });
  Object.keys(groups).forEach((key) => {
    const items = groups[key].sort((a,b) => a.startMin - b.startMin || a.endMin - b.endMin);
    for (let i = 0; i < items.length; i += 1) {
      for (let j = i + 1; j < items.length; j += 1) {
        const a = items[i];
        const b = items[j];
        if (a.startMin < b.endMin && b.startMin < a.endMin) {
          conflicts.push({
            status: '일정 겹침',
            instructor: a.instructor,
            date: a.date,
            dateLabel: fmtDate(a.date),
            detail: `${a.course} ${a.day} ${a.session} / ${a.time} / ${a.location} ↔ ${b.course} ${b.day} ${b.session} / ${b.time} / ${b.location}`,
            action: '강사 재배정 또는 시간 조정 필요'
          });
        } else if (a.location && b.location && a.location !== b.location && a.endMin === b.startMin) {
          conflicts.push({
            status: '지역 이동 확인',
            instructor: a.instructor,
            date: a.date,
            dateLabel: fmtDate(a.date),
            detail: `${a.course} ${a.time} ${a.location} 이후 ${b.course} ${b.time} ${b.location}`,
            action: '동일일 연속 강의 이동 가능 여부 확인'
          });
        }
      }
    }
  });
  return conflicts;
}

function updateEditStatus() {
  const el = document.getElementById('editStatus');
  if (!el) return;
  const count = changedAssignments().length;
  el.textContent = `수정 ${count}건`;
  el.style.color = count ? 'var(--amber)' : 'var(--muted)';
}

function toggleEditMode() {
  state.editMode = !state.editMode;
  document.getElementById('editModeBtn').classList.toggle('active', state.editMode);
  document.getElementById('editModeBtn').textContent = state.editMode ? '수정 모드 켜짐' : '수정 모드';
  renderAll();
  if (state.selectedInstructor) selectInstructor(state.selectedInstructor);
}

function setInstructor(sessionId, instructor) {
  const item = DATA.assignments.find((x) => x.id === sessionId);
  if (!item) return;
  item.instructor = instructor;
  persistEdits();
  recalculate();
  renderAll();
  if (state.selectedInstructor) selectInstructor(state.selectedInstructor);
}

function instructorControl(item) {
  const changed = ORIGINAL_INSTRUCTOR_BY_ID[item.id] !== item.instructor;
  if (!state.editMode) {
    return `<strong class="${changed ? 'changed-cell' : ''}">${escapeHtml(item.instructor)}</strong>${changed ? `<div class="change-note">${escapeHtml(ORIGINAL_INSTRUCTOR_BY_ID[item.id])} &rarr; ${escapeHtml(item.instructor)}</div>` : ''}`;
  }
  const options = allInstructorNames().map((name) => `<option value="${escapeHtml(name)}" ${name === item.instructor ? 'selected' : ''}>${escapeHtml(name)}</option>`).join('');
  return `<select class="edit-select ${changed ? 'changed-cell' : ''}" onchange="setInstructor('${item.id}', this.value)">${options}</select>${changed ? `<div class="change-note">${escapeHtml(ORIGINAL_INSTRUCTOR_BY_ID[item.id])} &rarr; ${escapeHtml(item.instructor)}</div>` : ''}`;
}

function resetEdits() {
  if (!confirm('\ud654\uba74\uc5d0\uc11c \uc218\uc815\ud55c \uac15\uc0ac \ubc30\uc815\uc744 \ubaa8\ub450 \uc6d0\ub798 \uc5d1\uc140 \uae30\uc900\uc73c\ub85c \ub418\ub3cc\ub9b4\uae4c\uc694?')) return;
  DATA.assignments = JSON.parse(JSON.stringify(ORIGINAL_ASSIGNMENTS));
  try {
    if (globalThis.localStorage) localStorage.removeItem(STORAGE_KEY);
  } catch (error) {
    console.warn('브라우저 임시 저장소 초기화를 건너뜁니다.', error);
  }
  recalculate();
  renderAll();
  if (state.selectedInstructor) selectInstructor(state.selectedInstructor);
}

function csvEscape(value) {
  const text = String(value ?? '');
  return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
}

function downloadChangeCsv() {
  const rows = changedAssignments();
  const header = ['\uad50\uc721\uc77c\uc790','\uad50\uc721\uc2dc\uac04','\uacfc\uc815\uba85','\ucc28\uc218','\uad50\uc218\uc124\uacc4\uc2dc\ud2b8','\uc77c\ucc28','\ucc28\uc2dc','\uc2dc\uc218','\uacfc\ubaa9\uba85','\ubcc0\uacbd\uc804 \uac15\uc0ac','\ubcc0\uacbd\ud6c4 \uac15\uc0ac','\uc9c0\uc5ed'];
  const lines = [header.join(',')].concat(rows.map((item) => [
    item.date, item.time, item.course, item.round, item.sheet, item.day, item.session, item.hours, item.subject, ORIGINAL_INSTRUCTOR_BY_ID[item.id], item.instructor, item.location
  ].map(csvEscape).join(',')));
  downloadBlob(`\uac15\uc0ac\ubc30\uc815_\ubcc0\uacbd\ub0b4\uc5ed_${new Date().toISOString().slice(0,10)}.csv`, '\ufeff' + lines.join('\n'), 'text/csv;charset=utf-8');
}

function downloadUpdatedHtml() {
  const clone = JSON.parse(JSON.stringify(DATA));
  clone.stats.updatedAt = new Date().toISOString().slice(0, 16).replace('T', ' ');
  const currentHtml = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const html = currentHtml.replace(
    /<script id="data" type="application\/json">[\s\S]*?<\/script>/,
    `<script id="data" type="application/json">${JSON.stringify(clone).replace(/<\//g, '<\\/')}<\/script>`
  );
  downloadBlob('\uac15\uc0ac\uad00\ub9ac\uc2dc\uc2a4\ud15c_\uc218\uc815\ubcf8.html', html, 'text/html;charset=utf-8');
}

function downloadBlob(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function bindNav() {
  document.querySelectorAll('#nav button').forEach((btn) => {
    btn.addEventListener('click', () => {
      state.section = btn.dataset.section;
      document.querySelectorAll('#nav button').forEach((b) => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.section').forEach((s) => s.classList.toggle('active', s.id === state.section));
      if (state.section === 'schedule') renderSchedule();
      if (state.section === 'courses') renderCourses();
      if (state.section === 'alerts') renderAlerts();
    });
  });
}

function buildFilters() {
  const instructors = allInstructorNames();
  const courses = unique(DATA.assignments.map((x) => x.course)).sort((a,b) => a.localeCompare(b, 'ko'));
  const months = unique(DATA.assignments.map((x) => x.date.slice(0, 7))).sort();
  document.getElementById('instructorFilter').innerHTML = `<option value="">전체 강사</option>${instructors.map((x) => `<option>${escapeHtml(x)}</option>`).join('')}`;
  document.getElementById('courseFilter').innerHTML = `<option value="">전체 과정</option>${courses.map((x) => `<option>${escapeHtml(x)}</option>`).join('')}`;
  document.getElementById('monthFilter').innerHTML = `<option value="">전체 월</option>${months.map((x) => `<option value="${x}">${x.replace('-', '.')}</option>`).join('')}`;
}

function bindFilters() {
  document.getElementById('globalSearch').addEventListener('input', (event) => {
    state.search = event.target.value.trim().toLowerCase();
    renderAll();
  });
  document.getElementById('instructorFilter').addEventListener('change', (event) => {
    state.instructor = event.target.value;
    if (state.instructor) selectInstructor(state.instructor);
    renderAll();
  });
  document.getElementById('courseFilter').addEventListener('change', (event) => {
    state.course = event.target.value;
    renderAll();
  });
  document.getElementById('monthFilter').addEventListener('change', (event) => {
    state.month = event.target.value;
    renderAll();
  });
}

function resetFilters() {
  state.instructor = '';
  state.course = '';
  state.month = '';
  state.search = '';
  document.getElementById('globalSearch').value = '';
  document.getElementById('instructorFilter').value = '';
  document.getElementById('courseFilter').value = '';
  document.getElementById('monthFilter').value = '';
  renderAll();
}

function filteredAssignments() {
  return DATA.assignments.filter((item) => {
    if (state.instructor && item.instructor !== state.instructor) return false;
    if (state.course && item.course !== state.course) return false;
    if (state.month && !item.date.startsWith(state.month)) return false;
    if (state.search) {
      const haystack = [item.instructor, item.course, item.round, item.location, item.subject, item.sheet, item.day, item.session].join(' ').toLowerCase();
      if (!haystack.includes(state.search)) return false;
    }
    return true;
  }).sort(byDate);
}

function renderAll() {
  recalculate();
  renderKpis();
  renderQuickInstructorList();
  renderOverviewRows();
  renderInstructorCards();
  renderSchedule();
  renderCourses();
  renderAlerts();
}

function renderKpis() {
  const s = DATA.stats;
  const items = [
    ['강사', `${s.instructorCount}명`, '강사별 일정 확인 가능'],
    ['총 세션', `${s.sessionCount}건`, `${s.totalHours}H 편성`],
    ['운영 과정', `${s.courseCount}개`, s.dateRange],
    ['장소', `${s.locationCount}곳`, '지역별 배정 포함'],
    ['섭외 상태', `${s.completedScheduleRows}/${s.scheduleRows}`, '교육일정 완료 기준'],
    ['확인 필요', `${s.conflictCount}건`, s.flaggedInstructors.length ? s.flaggedInstructors.join(', ') : '없음'],
  ];
  document.getElementById('kpis').innerHTML = items.map(([label, value, note]) => `
    <div class="kpi">
      <div class="kpi-label">${escapeHtml(label)}</div>
      <div class="kpi-value">${escapeHtml(value)}</div>
      <div class="kpi-note">${escapeHtml(note)}</div>
    </div>
  `).join('');
}

function renderQuickInstructorList() {
  document.getElementById('instructorCount').textContent = `${DATA.summary.length}명`;
  document.getElementById('quickInstructorList').innerHTML = DATA.summary.map(instructorCardHtml).join('');
  document.querySelectorAll('#quickInstructorList .instructor-card').forEach((card) => {
    card.addEventListener('click', () => {
      document.getElementById('instructorFilter').value = card.dataset.name;
      state.instructor = card.dataset.name;
      selectInstructor(card.dataset.name);
      renderAll();
      goSection('instructors');
    });
  });
}

function renderInstructorCards() {
  document.getElementById('instructorCards').innerHTML = DATA.summary.map(instructorCardHtml).join('');
  document.querySelectorAll('#instructorCards .instructor-card').forEach((card) => {
    card.classList.toggle('active', card.dataset.name === state.selectedInstructor);
    card.addEventListener('click', () => selectInstructor(card.dataset.name));
  });
}

function instructorCardHtml(item) {
  const hasWarn = item.timeConflict !== '없음' || item.travelConflict !== '없음';
  return `
    <div class="instructor-card" data-name="${escapeHtml(item.instructor)}">
      <div class="inst-top">
        <div class="inst-name">${escapeHtml(item.instructor)}</div>
        <div class="inst-hours">${escapeHtml(item.hours)}</div>
      </div>
      <div class="mini-stats">
        <div class="mini">세션<strong>${item.sessions}건</strong></div>
        <div class="mini">강의일<strong>${item.days}일</strong></div>
        <div class="mini">기간<strong>${fmtDate(item.firstDate).slice(5)}~${fmtDate(item.lastDate).slice(5)}</strong></div>
      </div>
      <div class="badges">
        <span class="badge ${hasWarn ? 'warn' : 'ok'}">${hasWarn ? '확인 필요' : '충돌 없음'}</span>
        ${item.travelConflict !== '없음' ? '<span class="badge warn">이동 확인</span>' : ''}
      </div>
    </div>
  `;
}

function selectInstructor(name) {
  state.selectedInstructor = name;
  const summary = DATA.summary.find((x) => x.instructor === name);
  const items = DATA.assignments.filter((x) => x.instructor === name).sort(byDate);
  document.getElementById('selectedInstructorTitle').textContent = name ? `${name} 강사 일정` : '강사를 선택하세요';
  document.getElementById('selectedInstructorBadge').textContent = summary ? `${summary.sessions}건 · ${summary.hours}` : '일정 확인';
  if (!summary) {
    document.getElementById('instructorDetail').innerHTML = '<div class="empty">강사를 선택하면 상세 일정이 표시됩니다.</div>';
    return;
  }
  const conflict = DATA.conflicts.filter((x) => x.instructor === name);
  const notice = conflict.length
    ? `<div class="notice">${conflict.map((x) => `${escapeHtml(x.dateLabel)} · ${escapeHtml(x.detail)}<br><strong>${escapeHtml(x.action)}</strong>`).join('<br>')}</div>`
    : '<div class="notice ok">현재 등록된 시간 중복은 없습니다.</div>';
  document.getElementById('instructorDetail').innerHTML = `
    <div class="detail-grid">
      <div class="detail-stat"><span>총 시수</span><strong>${escapeHtml(summary.hours)}</strong></div>
      <div class="detail-stat"><span>세션</span><strong>${summary.sessions}건</strong></div>
      <div class="detail-stat"><span>강의일</span><strong>${summary.days}일</strong></div>
      <div class="detail-stat"><span>기간</span><strong>${fmtDate(summary.firstDate).slice(5)} ~ ${fmtDate(summary.lastDate).slice(5)}</strong></div>
    </div>
    ${notice}
    <div class="table-wrap">
      <table>
        <thead><tr><th>일자</th><th>시간</th><th>강사</th><th>과정</th><th>장소</th><th>차시</th><th>시수</th><th>과목</th></tr></thead>
        <tbody>${items.map((item) => scheduleRowHtml(item, true)).join('')}</tbody>
      </table>
    </div>
  `;
  renderInstructorCards();
}

function renderOverviewRows() {
  const items = filteredAssignments();
  document.getElementById('resultCount').textContent = `${items.length}건`;
  document.getElementById('overviewRows').innerHTML = items.length ? items.map((item) => scheduleRowHtml(item, true)).join('') : '<tr><td colspan="8" class="empty">조건에 맞는 일정이 없습니다.</td></tr>';
}

function scheduleRowHtml(item, includeInstructor) {
  return `
    <tr>
      <td class="nowrap" data-label="일자">${fmtDate(item.date)}</td>
      <td class="nowrap" data-label="시간">${escapeHtml(item.time)}</td>
      ${includeInstructor ? `<td class="nowrap" data-label="강사">${instructorControl(item)}</td>` : ''}
      <td data-label="과정"><span class="course-pill">${escapeHtml(item.course)}</span><br><span class="muted">${escapeHtml(item.round)} · ${escapeHtml(item.sheet)}</span></td>
      <td data-label="장소">${escapeHtml(item.location)}</td>
      <td class="nowrap" data-label="차시">${escapeHtml(item.day)} ${escapeHtml(item.session)}</td>
      <td class="nowrap" data-label="시수">${escapeHtml(item.hours)}</td>
      <td class="subject" data-label="과목">${escapeHtml(item.subject)}</td>
    </tr>
  `;
}

function renderSchedule() {
  const items = filteredAssignments();
  document.getElementById('scheduleCount').textContent = `${items.length}건`;
  const groups = {};
  items.forEach((item) => {
    groups[item.date] ||= [];
    groups[item.date].push(item);
  });
  const html = Object.keys(groups).sort().map((date) => `
    <div class="date-group">
      <div class="date-head"><span>${fmtDate(date)}</span><span>${groups[date].length}건</span></div>
      <div class="day-list">
        ${groups[date].sort(byDate).map((item) => `
          <div class="day-item">
            <strong>${escapeHtml(item.time)}</strong>
            <span>${escapeHtml(item.instructor)}</span>
            <span>${escapeHtml(item.course)} ${escapeHtml(item.round)}</span>
            <span>${escapeHtml(item.subject)}</span>
            <span class="muted">${escapeHtml(item.location)}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  document.getElementById('dateSchedule').innerHTML = html || '<div class="empty">조건에 맞는 일정이 없습니다.</div>';
}

function renderCourses() {
  const courses = DATA.education.filter((row) => !state.course || row.course === state.course);
  const grouped = {};
  courses.forEach((row) => {
    grouped[row.course] ||= [];
    grouped[row.course].push(row);
  });
  document.getElementById('courseCards').innerHTML = Object.keys(grouped).map((course) => {
    const weeks = grouped[course];
    const related = DATA.assignments.filter((x) => x.course === course).sort(byDate);
    const instructors = unique(related.map((x) => x.instructor)).sort((a,b) => a.localeCompare(b, 'ko'));
    const hours = related.reduce((sum, item) => sum + item.hoursNum, 0);
    return `
      <div class="course-card wide">
        <h3>${escapeHtml(course)}</h3>
        <div class="badges">
          <span class="badge ok">${weeks.every((x) => x.status === '\uc644\ub8cc') ? '\uc644\ub8cc' : '\ud655\uc778 \ud544\uc694'}</span>
          <span class="badge info">${related.length}\uc138\uc158</span>
          <span class="badge neutral">${hours}H</span>
        </div>
        <div class="course-meta">
          <div><strong>\uae30\uac04</strong> ${weeks.map((x) => escapeHtml(x.period)).join(' / ')}</div>
          <div><strong>\uc7a5\uc18c</strong> ${escapeHtml(weeks[0]?.location || '')}</div>
          <div><strong>\uac15\uc0ac</strong> ${escapeHtml(instructors.join(', '))}</div>
          <div><strong>\uacfc\uc815\uba85</strong> ${escapeHtml(weeks[0]?.subject || '')}</div>
        </div>
        <div class="course-timetable table-wrap">
          <table>
            <thead>
              <tr><th>\uc77c\uc790</th><th>\uc2dc\uac04</th><th>\uac15\uc0ac</th><th>\uc77c\ucc28</th><th>\ucc28\uc2dc</th><th>\uc2dc\uc218</th><th>\uc7a5\uc18c</th><th>\uacfc\ubaa9</th></tr>
            </thead>
            <tbody>
              ${related.map((item) => `
                <tr>
                  <td class="nowrap" data-label="\uc77c\uc790">${fmtDate(item.date)}</td>
                  <td class="nowrap" data-label="\uc2dc\uac04">${escapeHtml(item.time)}</td>
                  <td class="nowrap" data-label="\uac15\uc0ac">${instructorControl(item)}</td>
                  <td class="nowrap" data-label="\uc77c\ucc28">${escapeHtml(item.day)}</td>
                  <td class="nowrap" data-label="\ucc28\uc2dc">${escapeHtml(item.session)}</td>
                  <td class="nowrap" data-label="\uc2dc\uc218">${escapeHtml(item.hours)}</td>
                  <td data-label="\uc7a5\uc18c">${escapeHtml(item.location)}</td>
                  <td class="subject" data-label="\uacfc\ubaa9">${escapeHtml(item.subject)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }).join('');
}

function renderAlerts() {
  document.getElementById('alertCount').textContent = `${DATA.conflicts.length}건`;
  if (!DATA.conflicts.length) {
    document.getElementById('alertPanel').innerHTML = '<div class="notice ok">충돌 또는 확인 필요 사항이 없습니다.</div>';
    return;
  }
  document.getElementById('alertPanel').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>상태</th><th>강사</th><th>일자</th><th>내용</th><th>조치</th></tr></thead>
        <tbody>
          ${DATA.conflicts.map((item) => `
            <tr>
              <td data-label="상태"><span class="badge warn">${escapeHtml(item.status)}</span></td>
              <td data-label="강사"><strong>${escapeHtml(item.instructor)}</strong></td>
              <td class="nowrap" data-label="일자">${escapeHtml(item.dateLabel)}</td>
              <td data-label="내용">${escapeHtml(item.detail)}</td>
              <td data-label="조치">${escapeHtml(item.action)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function goSection(id) {
  const btn = document.querySelector(`#nav button[data-section="${id}"]`);
  if (btn) btn.click();
}

init();
</script>
</body>
</html>
